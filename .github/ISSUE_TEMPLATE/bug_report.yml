name: Bug Report
description: Report a bug in a CLI or the plugin
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: cli
    attributes:
      label: Which CLI?
      options:
        - cli-web-futbin
        - cli-web-notebooklm
        - cli-web-gh-trending
        - cli-web-producthunt
        - cli-web-unsplash
        - cli-web-booking
        - cli-web-stitch
        - cli-web-pexels
        - cli-web-reddit
        - cli-web-gai
        - Plugin (cli-anything-web)
        - Other
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command that failed
      placeholder: "e.g., cli-web-booking search --dest Paris --json"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Describe what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Describe what actually happened.
    validations:
      required: true

  - type: textarea
    id: json_output
    attributes:
      label: "--json output (if available)"
      description: Run the command with `--json` and paste the output here.
      render: json

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "e.g., 3.12.8"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: Any other information that might help diagnose the issue.
